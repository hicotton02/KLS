apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keeping-law-simple-postgres
  namespace: keeping-law-simple
  labels:
    app: keeping-law-simple-postgres
    app.kubernetes.io/name: keeping-law-simple
spec:
  serviceName: keeping-law-simple-postgres
  replicas: 1
  selector:
    matchLabels:
      app: keeping-law-simple-postgres
  template:
    metadata:
      labels:
        app: keeping-law-simple-postgres
        app.kubernetes.io/name: keeping-law-simple
    spec:
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: kls
            - name: POSTGRES_USER
              value: kls
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keeping-law-simple-postgres-secrets
                  key: KLS_POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_INITDB_ARGS
              value: --data-checksums
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 8Gi
      terminationGracePeriodSeconds: 60
      nodeSelector:
        pool: cpu
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
        storageClassName: truenas-csi-iscsi-rwo

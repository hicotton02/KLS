apiVersion: apps/v1
kind: Deployment
metadata:
  name: keeping-law-simple-web
  namespace: keeping-law-simple
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: keeping-law-simple-web
  template:
    metadata:
      labels:
        app: keeping-law-simple-web
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-data-permissions
          image: busybox:1.36
          command:
            - sh
            - -lc
            - mkdir -p /data/geoip && chown -R 10001:10001 /data && chmod -R ug+rwX /data
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
      containers:
        - name: web
          image: registry.skazproconsulting.com/keeping-law-simple/web:20260704a
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: keeping-law-simple-config
            - secretRef:
                name: keeping-law-simple-secrets
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: keeping-law-simple-postgres-secrets
                  key: KLS_POSTGRES_PASSWORD
            - name: KLS_DATABASE_URL
              value: postgresql://kls@keeping-law-simple-postgres.keeping-law-simple.svc.cluster.local:5432/kls
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 2Gi
            limits:
              cpu: "1"
              memory: 12Gi
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      nodeSelector:
        pool: cpu

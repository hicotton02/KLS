apiVersion: batch/v1
kind: CronJob
metadata:
  name: keeping-law-simple-sync
  namespace: keeping-law-simple
  labels:
    skazpro.com/customer: skazpro
    skazpro.com/scope: skazpro
    skazpro.com/grace-seconds: "93600"
spec:
  schedule: "15 2 * * *"
  timeZone: America/Denver
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      completions: 52
      parallelism: 8
      completionMode: Indexed
      activeDeadlineSeconds: 82800
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: keeping-law-simple
            app.kubernetes.io/component: sync
        spec:
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: init-data-permissions
              image: busybox:1.36
              command:
                - sh
                - -lc
                - mkdir -p /data/geoip && chown -R 10001:10001 /data && chmod -R ug+rwX /data
              volumeMounts:
                - name: data
                  mountPath: /data
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                runAsNonRoot: false
                allowPrivilegeEscalation: false
          restartPolicy: Never
          containers:
            - name: sync
              image: registry.skazproconsulting.com/keeping-law-simple/web:20260719f
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -lc
                - |
                  set -eu
                  python - <<'PY'
                  from __future__ import annotations

                  import json
                  import os
                  from dataclasses import asdict

                  from app.sync_service import sync_states


                  raw_index = os.environ.get("JOB_COMPLETION_INDEX")
                  if raw_index is None:
                      raw_index = os.environ.get("HOSTNAME", "").rsplit("-", 1)[-1]
                  index = int(raw_index)
                  shards = [line.strip() for line in os.environ["KLS_SYNC_SHARDS"].splitlines() if line.strip()]
                  if index < 0 or index >= len(shards):
                      raise RuntimeError(f"KLS sync shard index {index} is outside 0..{len(shards) - 1}.")

                  states = shards[index].split()
                  print(f"Starting KLS sync shard {index}: {' '.join(states)}", flush=True)
                  completed, failed = sync_states(
                      states,
                      logger=print,
                      stale_after_seconds=int(os.environ.get("KLS_STALE_SYNC_SECONDS", "21600")),
                  )
                  print(
                      json.dumps(
                          {
                              "shard": index,
                              "states": states,
                              "completed": {state: asdict(stats) for state, stats in completed.items()},
                              "failed": failed,
                          },
                          indent=2,
                      ),
                      flush=True,
                  )
                  PY
              env:
                - name: KLS_SYNC_PARALLELISM
                  value: "1"
                - name: KLS_STALE_SYNC_SECONDS
                  value: "21600"
                - name: KLS_SYNC_SHARDS
                  value: |
                    alabama
                    alaska
                    arizona
                    arkansas
                    california
                    colorado
                    connecticut
                    delaware
                    district_of_columbia
                    federal
                    florida
                    georgia
                    hawaii
                    idaho
                    illinois
                    indiana
                    iowa
                    kansas
                    kentucky
                    louisiana
                    maine
                    maryland
                    massachusetts
                    michigan
                    minnesota
                    mississippi
                    missouri
                    montana
                    nebraska
                    nevada
                    new_hampshire
                    new_jersey
                    new_mexico
                    new_york
                    north_carolina
                    north_dakota
                    ohio
                    oklahoma
                    oregon
                    pennsylvania
                    rhode_island
                    south_carolina
                    south_dakota
                    tennessee
                    texas
                    utah
                    vermont
                    virginia
                    washington
                    west_virginia
                    wisconsin
                    wyoming
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keeping-law-simple-postgres-secrets
                      key: KLS_POSTGRES_PASSWORD
                - name: KLS_DATABASE_URL
                  value: postgresql://kls@keeping-law-simple-postgres.keeping-law-simple.svc.cluster.local:5432/kls
              envFrom:
                - configMapRef:
                    name: keeping-law-simple-config
                - secretRef:
                    name: keeping-law-simple-secrets
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 8Gi
          volumes:
            - name: data
              emptyDir: {}
            - name: tmp
              emptyDir: {}
          nodeSelector:
            pool: cpu

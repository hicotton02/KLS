apiVersion: batch/v1
kind: Job
metadata:
  name: keeping-law-simple-sync-indiana-count
  namespace: keeping-law-simple
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-data-permissions
          image: busybox:1.36
          command:
            - sh
            - -lc
            - mkdir -p /data/geoip && chown -R 10001:10001 /data && chmod -R ug+rwX /data
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
      restartPolicy: Never
      containers:
        - name: indiana-count
          image: registry.skazproconsulting.com/keeping-law-simple/web:20260427a
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import json
              from dataclasses import asdict
              from app.sync_service import sync_indiana
              print(json.dumps(asdict(sync_indiana(years=[2026], skip_interpretation=True, logger=print)), indent=2))
          env:
            - name: KLS_SYNC_PARALLELISM
              value: "4"
          envFrom:
            - configMapRef:
                name: keeping-law-simple-config
            - secretRef:
                name: keeping-law-simple-secrets
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: keeping-law-simple-data
        - name: tmp
          emptyDir: {}
      nodeSelector:
        kubernetes.io/hostname: cp
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

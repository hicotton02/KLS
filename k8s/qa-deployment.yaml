apiVersion: apps/v1
kind: Deployment
metadata:
  name: keeping-law-simple-qa-web
  namespace: keeping-law-simple
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keeping-law-simple-qa-web
  template:
    metadata:
      labels:
        app: keeping-law-simple-qa-web
        environment: qa
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: bootstrap-qa-data
          image: registry.skazproconsulting.com/keeping-law-simple/web:20260719b
          command:
            - python
            - -c
            - |
              from pathlib import Path
              import os
              import sqlite3

              source = Path("/source/keepinglawsimple.db")
              target = Path("/data/keepinglawsimple.db")
              target.parent.mkdir(parents=True, exist_ok=True)

              if (not target.exists() or target.stat().st_size == 0) and source.exists() and source.stat().st_size > 0:
                  source_conn = sqlite3.connect(f"file:{source}?mode=ro", uri=True)
                  try:
                      target_conn = sqlite3.connect(str(target))
                      try:
                          source_conn.backup(target_conn)
                      finally:
                          target_conn.close()
                  finally:
                      source_conn.close()

              Path("/data/geoip").mkdir(parents=True, exist_ok=True)
              os.chown("/data", 10001, 10001)
              os.chown("/data/geoip", 10001, 10001)
              if target.exists():
                  os.chown(str(target), 10001, 10001)
          volumeMounts:
            - name: data
              mountPath: /data
            - name: source-data
              mountPath: /source
              readOnly: true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
      containers:
        - name: web
          image: registry.skazproconsulting.com/keeping-law-simple/web:20260719b
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: keeping-law-simple-config
            - secretRef:
                name: keeping-law-simple-secrets
          env:
            - name: KLS_DATABASE_PATH
              value: /data/keepinglawsimple.db
            - name: KLS_PUBLIC_BASE_URL
              value: http://192.168.104.22
            - name: KLS_CANONICAL_HOST
              value: 192.168.104.22
            - name: KLS_REDIRECT_FROM_HOST
              value: 192.168.104.22
            - name: KLS_REDIRECT_TO_WWW
              value: "false"
            - name: KLS_ENVIRONMENT_NAME
              value: qa
            - name: KLS_ENVIRONMENT_LABEL
              value: QA
            - name: KLS_ALLOW_INDEXING
              value: "false"
            - name: KLS_GOOGLE_ANALYTICS_ID
              value: ""
            - name: KLS_ANALYTICS_ENABLED
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: keeping-law-simple-qa-data
        - name: source-data
          persistentVolumeClaim:
            claimName: keeping-law-simple-data
        - name: tmp
          emptyDir: {}
      nodeSelector:
        pool: cpu

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keeping-law-simple-web
  namespace: keeping-law-simple
spec:
  parentRefs:
    - name: skazpro-public
      namespace: gateway-system
      sectionName: https-kls-root
    - name: skazpro-public
      namespace: gateway-system
      sectionName: https-kls-www
  hostnames:
    - keepinglawsimple.org
    - www.keepinglawsimple.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: keeping-law-simple-web
          port: 80
